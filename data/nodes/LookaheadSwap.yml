node_id: lookahead_swap
name: "Lookahead Swap (LKHD)"
paradigm: "Static (SWAP)"
complexity: "Exponential"

publication:
  year: 2016
  venue: "21st Asia and South Pacific Design Automation Conference (ASP-DAC)"
  authors: "Wille, Keszocze, Walter, Rohrs, Chattopadhyay, Drechsler"
  arxiv: null
  doi: "10.1109/ASPDAC.2016.7428026"
  note: null

summary: |
  The Lookahead Swap (LKHD) algorithm is a heuristic approach designed to mitigate the fundamental weakness of greedy, local routing by predicting the impact of current SWAP choices on future circuit complexity. After establishing an initial mapping via a DAG that maximizes early qubit reuse, the algorithm selects the top N possible SWAP operations for the current gate and recursively evaluates their benefit over M future steps, selecting the choice that minimizes anticipated future SWAPs.

  Despite its advanced optimization goal, the primary limitation is prohibitively high computational complexity. Generating N×M tentative circuit layouts per two-qubit gate decision yields exponential scaling with qubit count, rendering LKHD infeasible for practical use on larger NISQ devices. Benchmarking shows transpilation time orders of magnitude slower than SABRE and Basic Swap. Although LKHD rivals SABRE and STCH on quality metrics for small circuits, its complexity effectively restricts it to circuits with a minimal qubit count. SABRE (2019) later achieved comparable or better quality at polynomial complexity, effectively superseding LKHD for practical use.

