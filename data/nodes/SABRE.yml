node_id: sabre
name: "SABRE (SWAP-based BidiREctional heuristic search)"
paradigm: "Arbitrary (SWAP)"
complexity: "O(N^2.5 * g) per two-qubit gate"

publication:
  year: 2019
  venue: "arXiv / ASPLOS"
  authors: "Li, Ding, Xie"
  arxiv: "1809.02573"
  doi: null
  note: null

summary: |
  SABRE was proposed to address the qubit mapping problem for Noisy Intermediate-Scale Quantum (NISQ) devices featuring arbitrary qubit connections. Its primary objective is to strike an efficient balance between minimizing added CNOT gate count and optimizing overall routing time. SABRE generates a DAG for the input circuit, partitions it into layers, and inserts SWAPs using a heuristic cost function restricted to qubits near the current front layer. This provides an exponential speedup over exhaustive search, reducing complexity from O(exp(N)) to O(N^2.5*g) per two-qubit gate.

  A key design feature is the reverse traversal technique for generating a high-quality initial mapping: a forward traversal is performed, the final mapping is taken, and used as the initial mapping for a subsequent reverse traversal. This provides global optimization by considering all circuit gates, significantly reducing routing overhead. SABRE also introduces a decay effect in its cost function to control SWAP parallelism, enabling a tunable trade-off between total gate count and circuit depth (~8% depth variation observed). SABRE consistently leads in CNOT count reduction and routing time, establishing it as the dominant baseline for subsequent algorithms: LightSABRE extends it directly, and RL Heuristics replaces its cost function with a learned policy.

