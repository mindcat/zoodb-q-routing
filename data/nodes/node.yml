$schema: "http://json-schema.org/draft-06/schema"

type: object
additionalProperties: false
required: ["node_id", "name", "summary"]

_zoo_primarykey: "node_id"

_zoo_relations:
  - object_field: "relations.baselines"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.baseline_for"

  - object_field: "relations.improves_upon"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.improved_by"

  - object_field: "relations.extends"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.extended_by"

  - object_field: "relations.inspired_by"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.inspires"

  - object_field: "relations.superseded_by"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.supersedes"

  - object_field: "relations.contemporaneous_with"
    to_object_type: "node"
    relation_primary_key_field: "node_id"
    relation_add_object_field: "node"
    backreference:
      field: "relations.contemporaneous_with_backref"

properties:
  node_id:
    type: string
    pattern: "^[a-z0-9_.-]+$"
    _single_line_string: true
    _description: >-
      An internal identifier for the routing algorithm. It must be unique across all algorithms.

  name:
    type: string
    _flm: standalone
    _single_line_string: true
    _description: >-
      The name of the algorithm. It is listed in multiple places, so don't make it too long.

  paradigm:
    type: string
    _single_line_string: true
    _description: >-
      The routing paradigm or topology (e.g., Static (SWAP), Arbitrary (SWAP), Dynamic).

  complexity:
    type: string
    _single_line_string: true
    _description: >-
      The computational time or space complexity of the algorithm.

  summary:
    type: string
    _flm: full
    _description: >-
      A summary and explanation of the routing algorithm.

  #
  # Publication metadata:
  #
  publication:
    type: object
    additionalProperties: false
    _description: >-
      Bibliographic information for the paper(s) introducing this algorithm.
    properties:
      year:
        type: ["integer", "null"]
        _description: >-
          Year of publication. Null for undated foundational heuristics.
      venue:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          Conference, journal, or venue name (e.g., ASPLOS '25, arXiv).
      authors:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          Author list as a plain string (e.g., "Li, Ding, Xie").
      institution:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          Affiliated institution(s), if notable (e.g., "IBM Quantum").
      arxiv:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          arXiv identifier, without the URL prefix (e.g., "1809.02573").
      doi:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          DOI string (e.g., "10.1145/3695053.3731084").
      thesis_url:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          URL for thesis entries that lack a DOI.
      note:
        type: ["string", "null"]
        _single_line_string: true
        _description: >-
          Any additional bibliographic note (e.g., multi-version papers, undated heuristics).

  #
  # Relations (e.g., algorithm lineage or comparisons):
  #
  relations:
    type: object
    additionalProperties: false
    properties:

      baselines:
        type: array
        _description: >-
          Algorithms that this algorithm is a direct baseline or fallback for.
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining the baseline relationship.
            node:
              _auto_populated: true

      improves_upon:
        type: array
        _description: >-
          Algorithms that this algorithm directly improves upon.
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining how this algorithm improves upon the target.
            node:
              _auto_populated: true

      extends:
        type: array
        _description: >-
          Algorithms whose structure or framework this algorithm directly extends
          (i.e., it is a strict superset or backward-compatible enhancement).
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining the extension relationship.
            node:
              _auto_populated: true

      inspired_by:
        type: array
        _description: >-
          Algorithms that conceptually inspired this algorithm without being directly extended.
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining the inspiration.
            node:
              _auto_populated: true

      superseded_by:
        type: array
        _description: >-
          Algorithms that have effectively replaced this algorithm for practical use.
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining why this algorithm was superseded.
            node:
              _auto_populated: true

      contemporaneous_with:
        type: array
        _description: >-
          Algorithms developed concurrently that address closely related problems
          on different hardware platforms or using different paradigms.
        items:
          type: object
          required: ["node_id"]
          additionalProperties: false
          properties:
            node_id:
              _single_line_string: true
              type: string
            note:
              type: string
              _description: >-
                Optional short note explaining the contemporaneous relationship.
            node:
              _auto_populated: true

      # automatically populated fields — do not specify manually
      baseline_for:
        _auto_populated: true
        type: array
        items:
          type: object

      improved_by:
        _auto_populated: true
        type: array
        items:
          type: object

      extended_by:
        _auto_populated: true
        type: array
        items:
          type: object

      inspires:
        _auto_populated: true
        type: array
        items:
          type: object

      supersedes:
        _auto_populated: true
        type: array
        items:
          type: object

      contemporaneous_with_backref:
        _auto_populated: true
        type: array
        items:
          type: object
