summary: |
  High Error Rate Routing (HERR) is a representative example of a noise-aware routing algorithm that integrates real-time hardware characteristics into the routing decision process. The goal of HERR is to enhance circuit accuracy by actively identifying and routing around noisy physical links in the hardware topology, even if doing so necessitates the insertion of additional SWAP gates.

  The mechanism of HERR is fundamentally an extension of Basic Swap: it searches for a lower-error path between non-adjacent qubits, and if no such advantageous path exists, it defaults to the shortest path solution provided by the Basic Swap algorithm. HERR's noise thresholds can be dynamically adjusted based on current quantum calibration data, making it most effective in niche scenarios involving high-occupancy circuits and devices with a limited number of high-error "bad links."

