  note: "v1 (ICCAD '22, DOI:10.1145/3508352.3549331) introduced OLSQ for reconfigurable atom arrays; v2 (Quantum 2024, DOI:10.22331/q-2024-03-14-1281) extended to full DPQA treatment."

summary: |
  OLSQ-DPQA (Optimal Layout Synthesis for Quantum Computing — Dynamically Field-Programmable Qubit Arrays) applies Satisfiability Modulo Theories (SMT) solvers to the NAQC compilation problem, attempting to find globally optimal qubit layouts and movement schedules for neutral atom array processors. By formulating scheduling, placement, and routing as a set of logical constraints, OLSQ-DPQA can guarantee optimality for small circuits.

  Its reliance on NP-complete SMT solving creates fundamental scalability barriers: OLSQ-DPQA times out on circuits with as few as 90 qubits, making it impractical for larger benchmarks. This scalability failure directly motivated the development of Enola, which replaced the solver with a near-linear heuristic while maintaining near-optimal stage counts. Enola achieved 3.7x fewer two-qubit gate stages and 5.9x fidelity improvement on QAOA benchmarks compared to OLSQ-DPQA.

relations:
