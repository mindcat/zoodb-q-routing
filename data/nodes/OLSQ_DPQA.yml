summary: |
  OLSQ-DPQA (Optimal Layout Synthesis for Quantum Computing — Dynamically Field-Programmable Qubit Arrays) applies Satisfiability Modulo Theories (SMT) solvers to the NAQC compilation problem, attempting to find globally optimal qubit layouts and movement schedules for neutral atom array processors.

  By formulating the scheduling, placement, and routing problem as a set of logical constraints, OLSQ-DPQA can guarantee optimality for small circuits. However, its reliance on NP-complete SMT solving creates fundamental scalability barriers: it times out on circuits with as few as 90 qubits, making it impractical for larger benchmarks. This scalability failure directly motivated the development of Enola, which replaced the solver with a near-linear heuristic while maintaining near-optimal stage counts.

relations:
  superseded_by:
    - node_id: enola
      note: "Enola achieves near-linear scalability (up to 10,000 qubits) versus OLSQ-DPQA timing out at ~90 qubits; 3.7x fewer gate stages and 5.9x fidelity gain on QAOA benchmarks"
  inspired_by:
