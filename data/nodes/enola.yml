summary: |
  The Enola compilation framework (efficient and near-optimal layout synthesizer for atom arrays) represents the prior state-of-the-art for dynamically field-programmable neutral atom array processors (DPQA). It addresses the challenge of mitigating the dominant error source in NAQCs by minimizing the total number of Rydberg stages required for circuit execution. Enola uses a three-stage sequential decomposition comprising scheduling, placement, and routing components.

  Crucially, the scheduler relates the DPQA scheduling problem to graph edge-coloring, employing the provably near-optimal Misra-Gries algorithm to assign gates to S_opt or S_opt+1 stages. This achieved near-linear scalability (compilation of circuits up to 10,000 qubits in ~30 minutes), compared to the NP-complete SMT approach of its predecessor OLSQ-DPQA, which timed out at ~90 qubits. Enola reduced two-qubit gate stages by 3.7x and enhanced fidelity by 5.9x versus OLSQ-DPQA on QAOA benchmarks.

  Despite these advances, the rigid "home site" paradigm inherent in Enola's design presents significant constraints. To prevent qubit clustering and ensure spatial separation during transitions, Enola's movement scheme necessitates reverting qubits to a predefined initial layout after each Rydberg stage, incurring substantial movement overhead. This requirement fundamentally limits efficient integration of the Zoned Architecture (ZA): home sites would need to reside entirely within the storage zone, forcing qubits to shuttle back and forth between zones for every stage. These limitations directly motivated PowerMove.

