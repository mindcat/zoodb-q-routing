node_id: powermove
name: "PowerMove"
paradigm: "Dynamic (NAQC / Zoned Architecture)"

publication:
  year: 2025
  venue: "ASPLOS '25"
  authors: "Ruan, Fang, Zhang, Li, Humble, Ding"
  arxiv: "2411.12263"
  doi: null

summary: |
  PowerMove is an optimizing compilation framework specifically designed for Neutral Atom Quantum Computers (NAQCs) that utilize a Zoned Architecture (ZA). PowerMove addresses the distinct challenges of NAQCs, which feature advanced capabilities such as collective qubit movement.

  Central to its innovation is the Continuous Router, which integrates qubit allocation and movement decisions to facilitate direct transitions between required layouts for subsequent stages, eliminating the costly "home-site revert" overhead of prior compilers like Enola. The framework integrates three specialized components: the Stage Scheduler (minimizes inter-zone qubit interchange between consecutive CZ stages), the Continuous Router (enables fully dynamic layout transitions), and the Coll-Move Scheduler (parallelizes collective movements via multiple AOD arrays to suppress decoherence). Benchmarks indicate PowerMove provides execution time reductions of 2.03×–3.76× and compilation time reductions up to 216.9× versus Enola, with fidelity improvements of several orders of magnitude on large-scale benchmarks.

