summary: |
  Stochastic Swap (STCH) is a heuristic strategy that focuses on maximizing parallelism and minimizing circuit depth by optimizing SWAP insertion within contiguous layers of the quantum circuit. Rather than conducting an exhaustive look-ahead search, STCH employs random permutations to identify the optimal SWAP configuration exclusively for the current layer of executable gates, exploiting layer parallelism to minimize temporal circuit length.

  The layer-restricted search involves an inherent trade-off: restricting optimization to a single layer means the algorithm may fail to identify globally optimal solutions spanning multiple layers. This is reflected in experimental data — STCH typically inserts more CNOT gates than SABRE, which prioritizes gate count reduction. However, its depth-focused design means it frequently achieves competitive circuit depth against SABRE due to high layer density, organizing added CNOTs into parallel operations. This makes STCH potentially attractive for future depth-critical hardware. STCH shares the motivation of Lookahead Swap — looking beyond the immediate gate — but restricts its scope to single layers for tractability.

