node_id: stochastic_swap
name: "Stochastic Swap (STCH)"
paradigm: "Static (SWAP)"

publication:
  year: null
  venue: null
  note: "Foundational Qiskit heuristic; no standalone origin paper. Widely used as a depth-optimizing baseline in Qiskit's transpilation pipeline."
  arxiv: null
  doi: null

summary: |
  Stochastic Swap (STCH) is a heuristic strategy that focuses on maximizing parallelism and minimizing the circuit depth by optimizing SWAP insertion within contiguous layers of the quantum circuit. Rather than conducting an exhaustive, look-ahead search, Stochastic Swap employs random permutations to identify the optimal SWAP configuration exclusively for the current layer of executable gates.

  This layer-restricted search inherently involves a trade-off, as the algorithm may fail to identify globally optimal solutions that might span multiple layers. Despite introducing more total CNOT gates than SABRE, STCH frequently achieves competitive circuit depth through high layer density, making it attractive for depth-critical future hardware.

