summary: |
  LightSABRE is a substantially enhanced version of SABRE developed iteratively within Qiskit, targeting both runtime efficiency and circuit quality for modern quantum hardware. By Qiskit 1.2.0, LightSABRE is approximately 200x faster than the Qiskit 0.20.1 SABRE implementation, driven primarily by porting the core algorithm to Rust (first introduced at Qiskit 0.22.4). Across benchmark circuits, LightSABRE achieves an average 18.9% reduction in SWAP gate count compared to original SABRE.

  The core algorithmic improvements are: (1) Relative Scoring — rather than recomputing the full SABRE heuristic for every candidate SWAP at Theta(|F|^2), LightSABRE evaluates only the relative change each SWAP induces in O(1) terms, reducing best-swap selection to Theta(|F|). (2) Multiple Trials — parallel routing trials with different random seeds, selecting the highest-quality output, converting SABRE's nondeterminism from liability to search advantage. (3) Seeded Initial Layout — VF2Layout checks for perfect subgraph embedding; SabrePreLayout extends this to "almost-perfect" layouts via distance-2 graph augmentation and subgraph isomorphism. (4) Disjoint Connectivity Graphs — explicit handling for modular multi-QPU architectures or topologies with filtered faulty qubits, routing each connected component independently. (5) Classical Control Flow — recursive routing of mid-circuit if-else branches, with SWAP epilogues appended to realign branch-final layouts and preserve SABRE's lookahead across control flow boundaries. (6) Heuristic Enhancements — two new optional cost function terms: a depth component (D*delta_depth/3, penalizing SWAPs that increase 2Q gate depth) and a critical path component (alpha^r_gate, upweighting SWAPs that unblock high-descendant-count gates). (7) Release Valve — addresses SABRE's known local-minimum failure mode by backtracking to the last routed gate and using Dijkstra's algorithm to greedily escape; zero runtime cost when not triggered.

  Scaling benchmarks on Bernstein-Vazirani circuits up to 19,998 qubits on a 142x142 grid confirm practical runtime scaling for near-term systems with thousands of qubits.

